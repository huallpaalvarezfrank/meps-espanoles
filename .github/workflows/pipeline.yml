name: Pipeline semanal MEPs

on:
  schedule:
    - cron: '59 21 * * 6'  # Sábados ~23:59 hora Madrid (verano UTC+2=23:59; invierno UTC+1=22:59 — siempre en sábado)
  workflow_dispatch:        # permite lanzar manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para git push al repo

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install playwright pandas openpyxl anthropic
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Scraping (EU.py)
        run: python etl/EU.py --headless

      - name: Clasificar reuniones nuevas (clasificar.py)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -X utf8 etl/clasificar.py

      - name: Normalizar nombres (normalizar.py)
        run: python -X utf8 etl/normalizar.py

      - name: Actualizar versión de BD
        run: echo "$(date -u +%s)" > db_version.txt

      - name: Commit y push BD actualizada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meps_es_reuniones.db etl/revisar.csv db_version.txt
          git diff --staged --quiet || git commit -m "Actualización automática $(date +'%Y-%m-%d')"
          git push
